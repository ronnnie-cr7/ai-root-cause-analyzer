version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - api